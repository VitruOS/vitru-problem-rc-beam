id: rc_beam_base
abstract: true
version: "0.5.0"
title: "RC beam — ultimate bending capacity base (AS 3600)"
standard: "AS 3600-2018"
tags: [concrete, beam, ULS]
author: "Luke Weatherstone"
description: "Explores RC beam designs under ultimate bending to AS 3600-2018. Navigates tradeoffs between section area and steel area across concrete grade, depth, bar size, and bar count."
github_url: "https://github.com/VitruOS/vitru-problem-rc-beam"

# ── VARIABLES ─────────────────────────────────────────────────────────────────
# Material variables universal to all beam types.
# Geometry, reinforcement and cover variables are in child schemas.

variables:
  fc_MPa:
    label: "Concrete grade"
    type: discrete
    unit: MPa
    options: [32, 40]
    default: 32
    fixed: false
    highlight: true
    description: "Characteristic compressive strength f'c"

# ── PARAMETERS ────────────────────────────────────────────────────────────────
# Universal fixed inputs. Only things meaningful regardless of beam type live here.

parameters:
  fsy_MPa:
    value: 500
    unit: MPa
    description: "Reinforcement yield strength."
    variable_config:
      active: false
      type: discrete
      options: [230, 410, 500, 600]

  # -- Design actions --
  M_star_kNm:
    value: 500.0
    unit: kNm
    description: "Factored design bending moment (ULS) — sagging positive"

  N_star_kN:
    value: 0.0
    unit: kN
    description: "Factored design axial force (ULS) — compression positive"
    variable_config:
      active: false
      type: continuous
      bounds: [-2000.0, 5000.0]
      step: 50.0

  # -- Exposure --
  exposure_class:
    value: "A1"
    description: "AS 3600 Table 4.3 exposure class — governs minimum cover"
    note: "Valid values: A1, A2, B1, B2, C1, C2"

  formwork:
    value: "standard"
    description: "Formwork type — governs minimum cover per AS 3600 Table 4.10.3"
    note: "Valid values: standard, rigid"

  # -- Cost rates --
  unit_cost_concrete_AUD_per_m3:
    value: 180.0
    unit: "AUD/m³"
    description: "Supplied and placed concrete unit rate"
    source: "Indicative Sydney 2025 — verify with supplier quote"
    variable_config:
      active: false
      type: continuous
      bounds: [120.0, 400.0]
      step: 5.0

  unit_cost_steel_AUD_per_kg:
    value: 1.80
    unit: "AUD/kg"
    description: "Reinforcing steel supply and fix unit rate"
    source: "Indicative Sydney 2025 — verify with supplier quote"
    variable_config:
      active: false
      type: continuous
      bounds: [1.20, 3.50]
      step: 0.10

  # -- Carbon factors --
  carbon_concrete_kgCO2e_per_m3:
    value_by_grade:
      "25": 195
      "32": 225
      "40": 270
      "50": 320
      "65": 370
      "80": 410
    unit: "kgCO2e/m³"
    key_unit: "MPa"
    description: "Embodied carbon factor for concrete by f'c grade"
    source: "EPIC Australia database v3 — general purpose cement blend"

  carbon_steel_kgCO2e_per_kg:
    value: 1.51
    unit: "kgCO2e/kg"
    description: "Embodied carbon factor for reinforcing steel"
    source: "EPIC Australia — Australian manufactured rebar (InfraBuild)"
    variable_config:
      active: false
      type: continuous
      bounds: [0.50, 3.00]
      step: 0.05

  # -- Reinforcement spacing limits --
  min_clear_spacing_mm:
    value: 100
    unit: mm
    label: "Min clear bar spacing"
    description: "Minimum clear spacing between reinforcing bars"

  max_clear_spacing_mm:
    value: 300
    unit: mm
    label: "Max clear bar spacing"
    description: "Maximum clear spacing between reinforcing bars"

# ── CONSTRAINTS ───────────────────────────────────────────────────────────────

constraints:
  bending_utilisation_upper:
    label: "Utilisation upper limit"
    description: "The maximum allowable utilisation - preferential."
    expression: "bending_utilisation"
    limit: 0.95
    display: "≤ 0.95"
    active: true
    locked: false

  bending_utilisation_lower:
    label: "Utilisation lower limit"
    description: "The minimum allowable utilisation - preferential."
    expression: "-bending_utilisation"
    limit: -0.75
    display: "≥ 0.75"
    active: true
    locked: false

  flexural_capacity:
    label: "Flexural capacity"
    description: "Factored moment capacity must meet or exceed M*"
    expression: "M_star_kNm - phi_Muo_kNm"
    limit: 0.0
    display: "M* ≤ φMuo"
    active: true
    locked: true
    standard_clause: "AS 3600 Cl. 8.1"

  ductility_ratio:
    label: "Ductility (ku)"
    description: "Neutral axis parameter ku must not exceed 0.36"
    expression: "ku"
    limit: 0.36
    display: "ku ≤ 0.36"
    active: true
    locked: false
    standard_clause: "AS 3600 Cl. 8.1.5"

  min_steel_ratio:
    label: "Minimum steel"
    description: "Tensile steel ratio must meet AS 3600 minimum"
    expression: "rho_min - rho_t"
    limit: 0.0
    display: "ρt ≥ ρmin"
    active: true
    locked: true
    standard_clause: "AS 3600 Cl. 8.1.6.1"

# ── OBJECTIVES ────────────────────────────────────────────────────────────────

objectives:
  material_cost:
    label: "Material cost"
    unit: "AUD/m"
    description: "Combined concrete and steel cost per metre of beam"
    expression: "cost_per_m_AUD"
    direction: minimise
    active: false

  embodied_carbon:
    label: "Embodied carbon"
    unit: "kgCO2e/m"
    description: "Cradle-to-gate carbon per metre of beam"
    expression: "carbon_per_m_kgCO2e"
    direction: minimise
    active: false

  section_area:
    label: "Concrete section area"
    unit: "mm²"
    description: "Gross concrete area — proxy for self-weight and formwork"
    expression: "Ag_mm2"
    direction: minimise
    active: true

  steel_area:
    label: "Total steel area"
    unit: "mm²"
    decimals: 1
    description: "Total reinforcement area across all faces"
    expression: "Ast_total_mm2"
    direction: minimise
    active: true

# ── EVALUATE ──────────────────────────────────────────────────────────────────

evaluate:
  geometry_resolver: "__beam_type__"
  analyser: "vitru_problem_rc_beam.analyse"
  outputs:
    - phi_Muo_kNm
    - ku
    - rho_min
    - rho_t
    - cover_min_mm
    - d_mm
    - b_eff_mm
    - Ag_mm2
    - Ast_total_mm2
    - cost_per_m_AUD
    - carbon_per_m_kgCO2e
    - bending_utilisation

  output_meta:
    bending_utilisation:
      label: "Bending utilisation"
      unit: null
      decimals: 3
      highlight: true
      display: utilisation_bar
      display_config:
        constraint: bending_utilisation_upper
    phi_Muo_kNm:
      label: "φMuo"
      unit: "kNm"
      decimals: 1
      highlight: true
    ku:
      label: "Neutral axis ku"
      unit: null
      decimals: 3
      highlight: true
      display: threshold_indicator
      display_config:
        constraint: ductility_ratio
        below_label: "Ductile"
        above_label: "Ltd ductility"
    d_mm:
      label: "Effective depth d"
      unit: "mm"
      decimals: 0
    rho_t:
      label: "Steel ratio ρt"
      unit: null
      decimals: 4
    rho_min:
      label: "Min steel ratio ρmin"
      unit: null
      decimals: 4
    Ag_mm2:
      label: "Gross area Ag"
      unit: "mm²"
      decimals: 0
    Ast_total_mm2:
      label: "Steel area Ast"
      unit: "mm²"
      decimals: 0
    cover_min_mm:
      label: "Min cover (AS 3600)"
      unit: "mm"
      decimals: 0
    cost_per_m_AUD:
      label: "Cost"
      unit: "AUD/m"
      decimals: 2
    carbon_per_m_kgCO2e:
      label: "Carbon"
      unit: "kgCO₂e/m"
      decimals: 2

# ── SOLVER DEFAULTS ───────────────────────────────────────────────────────────

solver:
  algorithm: NSGA2
  population_size: 80
  n_generations: 150
  seed: 42
  termination:
    type: convergence
    xtol: 1.0e-3
    cvtol: 1.0e-6
    ftol: 1.0e-3
    period: 10

# ── LLM CONTEXT ───────────────────────────────────────────────────────────────

llm_context: >
  This problem optimises an RC beam section for ultimate bending capacity to
  AS 3600-2018. M* and N* are the design actions — no span or load input.

  Default MOO variables: section dimensions, bottom and top bar size and count,
  concrete grade. Cover and side bars are fixed parameters by default.

  Promoting parameters to variables (set variable_config.active to true):
  - "vary the cover" → promote cover_bot_mm and/or cover_top_mm
  - "include side bars in the optimisation" → promote n_side_per_face, dia_side_mm
  - "test different concrete costs" → promote unit_cost_concrete_AUD_per_m3

  Common intent mappings:
  - "M* is 800 kNm" → set M_star_kNm value to 800
  - "300 kN compression" → set N_star_kN value to 300
  - "exposure class B2" → set exposure_class to B2; remind user to update cover values
  - "fix the width" → set relevant width variable fixed: true
  - "use green steel" → reduce carbon_steel_kgCO2e_per_kg toward 0.5–0.8
  - "change concrete carbon for 40 MPa to 230" → update only that grade:
    {"parameters": {"carbon_concrete_kgCO2e_per_m3": {"25": 195, "32": 225, "40": 230, "50": 320, "65": 370, "80": 410}}}
    Always include ALL grades in the dict — missing grades revert to defaults.
  - "set all concrete carbon to 200" → set every grade to 200:
    {"parameters": {"carbon_concrete_kgCO2e_per_m3": {"25": 200, "32": 200, "40": 200, "50": 200, "65": 200, "80": 200}}}

  Constraints marked locked: true must never be deactivated.
