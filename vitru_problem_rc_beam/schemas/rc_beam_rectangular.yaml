id: rc_beam_rectangular
extends: rc_beam_base
version: "0.6.0"
title: "RC beam — rectangular section (AS 3600)"
tags: [concrete, beam, rectangular, ULS]
verified: true

# ── VARIABLES ─────────────────────────────────────────────────────────────────
# Default beam mode: n_bot, n_top free; s_bot_mm, s_top_mm fixed (derived).
# Spacing mode: swap fixed/free for each pair. Exactly one per pair must be free.

variables:
  b_mm:
    label: "Beam width"
    type: continuous
    unit: mm
    bounds: [250, 250]
    default: 250
    step: 25
    fixed: true
    highlight: true
    description: "Overall beam width"
    variable_config:
      active: false
      type: continuous
      bounds: [150, 900]
      step: 25

  D_mm:
    label: "Overall depth"
    type: continuous
    unit: mm
    bounds: [700, 1000]
    default: 800
    step: 25
    fixed: false
    highlight: true
    description: "Overall section depth"
    variable_config:
      active: false
      type: continuous
      bounds: [200, 1500]
      step: 25

  # -- Bottom face --
  n_bot:
    label: "No. bottom bars"
    type: continuous
    unit: null
    bounds: [2, 20]
    default: 4
    step: 1
    fixed: false
    highlight: true
    description: >
      Number of tensile bars on the bottom face.
      Free in beam mode. Fix and free s_bot_mm to switch to spacing mode.

  s_bot_mm:
    label: "Bottom bar spacing (c-c)"
    type: continuous
    unit: mm
    bounds: [50, 300]
    default: null
    step: 5
    fixed: true
    description: >
      Centre-to-centre spacing of bottom bars.
      In beam mode (default): fixed, default null — derived by geometry builder
      from n_bot, b_mm, cover and dia. Not used as input.
      In spacing mode: free this and fix n_bot.

  dia_bot_mm:
    label: "Bottom bar diameter"
    type: discrete
    unit: mm
    options: [12, 16, 20, 24, 28, 32, 36, 40]
    default: 24
    fixed: false
    highlight: true
    description: "Diameter of tensile (bottom) reinforcing bars"

  # -- Top face --
  n_top:
    label: "No. top bars"
    type: continuous
    unit: null
    bounds: [2, 20]
    default: 2
    step: 1
    fixed: false
    highlight: true
    description: >
      Number of bars on the top face.
      Free in beam mode. Fix and free s_top_mm to switch to spacing mode.

  s_top_mm:
    label: "Top bar spacing (c-c)"
    type: continuous
    unit: mm
    bounds: [50, 300]
    default: null
    step: 5
    fixed: true
    description: >
      Centre-to-centre spacing of top bars.
      In beam mode (default): fixed, default null — derived by geometry builder.
      In spacing mode: free this and fix n_top.

  dia_top_mm:
    label: "Top bar diameter"
    type: discrete
    unit: mm
    options: [12, 16, 20, 24, 28, 32]
    default: 16
    fixed: false
    highlight: true
    description: "Diameter of top face bars"

# ── PARAMETERS ────────────────────────────────────────────────────────────────

parameters:
  cover_bot_mm:
    value: 30
    unit: mm
    description: "Nominal cover to bottom face bars"
    variable_config:
      active: false
      type: continuous
      bounds: [20, 100]
      step: 10

  cover_top_mm:
    value: 30
    unit: mm
    description: "Nominal cover to top face bars"
    variable_config:
      active: false
      type: continuous
      bounds: [20, 100]
      step: 10

  n_side_per_face:
    value: 0
    unit: null
    description: >
      Number of side face bars per vertical face. Default 0 (none).
      Required by AS 3600 Cl. 8.6 when D > 750 mm.
    variable_config:
      active: false
      type: continuous
      bounds: [20, 100]
      step: 10

  dia_side_mm:
    value: 16
    unit: mm
    description: "Diameter of side face bars (only used when n_side_per_face > 0)"
    variable_config:
      active: false
      type: discrete
      options: [12, 16, 20]

  s_side_mm:
    value: null
    unit: mm
    description: >
      Centre-to-centre spacing of side bars.
      Derived by geometry builder from n_side_per_face, D, cover and dia.
      Not used as input — present as output only for constraint checking.

  cover_side_mm:
    value: 30
    unit: mm
    description: "Nominal cover to side face bars"
    variable_config:
      active: false
      type: discrete
      options: [20, 25, 30, 40, 50, 65, 70, 75]

# ── CONSTRAINTS ───────────────────────────────────────────────────────────────
# Spacing constraints here only — universal constraints inherited from base.

constraints:
  min_clear_spacing_bot:
    label: "Min clear spacing (bottom)"
    description: "Clear spacing between bottom bars must meet the minimum clear spacing limit"
    expression: "min_clear_spacing_mm - clear_spacing_bot_mm"
    limit: 0.0
    display: "≥ {min_clear_spacing_mm} mm"
    active: true
    locked: false

  max_clear_spacing_bot:
    label: "Max clear spacing (bottom)"
    description: "Clear spacing between bottom bars must not exceed the maximum clear spacing limit"
    expression: "clear_spacing_bot_mm - max_clear_spacing_mm"
    limit: 0.0
    display: "≤ {max_clear_spacing_mm} mm"
    active: true
    locked: false

  min_clear_spacing_top:
    label: "Min clear spacing (top)"
    description: "Clear spacing between top bars must meet the minimum clear spacing limit"
    expression: "min_clear_spacing_mm - clear_spacing_top_mm"
    limit: 0.0
    display: "≥ {min_clear_spacing_mm} mm"
    active: true
    locked: false

  max_clear_spacing_top:
    label: "Max clear spacing (top)"
    description: "Clear spacing between top bars must not exceed the maximum clear spacing limit"
    expression: "clear_spacing_top_mm - max_clear_spacing_mm"
    limit: 0.0
    display: "≤ {max_clear_spacing_mm} mm"
    active: true
    locked: false

  min_clear_spacing_side:
    label: "Min clear spacing (side)"
    description: "Clear spacing between side bars must meet the minimum clear spacing limit"
    expression: "min_clear_spacing_mm - clear_spacing_side_mm"
    limit: 0.0
    display: "≥ {min_clear_spacing_mm} mm"
    active: false # Inactive by default — side bars default to 0
    locked: false
    note: "Activate when n_side_per_face > 0"

  max_clear_spacing_side:
    label: "Max clear spacing (side)"
    description: "Clear spacing between side bars must not exceed the maximum clear spacing limit"
    expression: "clear_spacing_side_mm - max_clear_spacing_mm"
    limit: 0.0
    display: "≤ {max_clear_spacing_mm} mm"
    active: false
    locked: false
    note: "Activate when n_side_per_face > 0"

  bars_fit_width_bot:
    label: "Bottom bars fit within width"
    description: "All bottom bars must physically fit within beam width"
    expression: "b_bot_required_mm - b_mm"
    limit: 0.0
    display: "≤ beam width"
    active: true
    locked: true
    note: >
      n_bot_required_mm = 2*cover_bot + n_bot*dia_bot + (n_bot-1)*min_clear_spacing_bot.
      Catches cases where spacing mode produces more bars than fit.

  bars_fit_width_top:
    label: "Top bars fit within width"
    description: "All top bars must physically fit within beam width"
    expression: "b_top_required_mm - b_mm"
    limit: 0.0
    display: "≤ beam width"
    active: true
    locked: true

  cover_requirement:
    label: "Concrete cover"
    description: "Nominal cover to tension face must meet exposure class minimum"
    expression: "cover_min_mm - cover_bot_mm"
    limit: 0.0
    display: "≥ min cover"
    active: true
    locked: true
    standard_clause: "AS 3600 Table 4.10.3"
    note: cover_bot_mm is resolved from child schema parameters.
      For circular sections, cover_mm is used instead.

# ── EVALUATE OUTPUTS (additional to base) ─────────────────────────────────────

evaluate:
  geometry_resolver: "vitru_problem_rc_beam.geometry.rectangular"
  output_meta:
    s_bot_mm:
      label: "Bot bar spacing"
      unit: "mm"
      decimals: 0
    s_top_mm:
      label: "Top bar spacing"
      unit: "mm"
      decimals: 0
    clear_spacing_bot_mm:
      label: "Clear spacing (bot)"
      unit: "mm"
      decimals: 0
    clear_spacing_top_mm:
      label: "Clear spacing (top)"
      unit: "mm"
      decimals: 0
  additional_outputs:
    - clear_spacing_bot_mm
    - clear_spacing_top_mm
    - clear_spacing_side_mm
    - min_clear_spacing_bot_mm
    - min_clear_spacing_top_mm
    - min_clear_spacing_side_mm
    - n_bot_required_mm
    - n_top_required_mm
    - n_bot # Returned when in spacing mode (derived)
    - n_top # Returned when in spacing mode (derived)
    - s_bot_mm # Returned when in beam mode (derived)
    - s_top_mm # Returned when in beam mode (derived)
    - s_side_mm # Always derived

constraint_overrides:
  cover_requirement:
    note: "Uses cover_bot_mm as cover_tension_mm"

llm_context_append: >
  Rectangular section: b_mm x D_mm. Effective depth d = D - cover_bot - dia_bot/2.
  Bottom bars are primary tension steel. Top bars provide compression reinforcement.

  Bar input modes:
  - Beam mode (default): n_bot and n_top are MOO variables. Spacing is derived and
    returned as an output. Spacing constraints still enforced.
  - Spacing mode: free s_bot_mm/s_top_mm and fix n_bot/n_top. Bar count derived.
  - Exactly one of each pair (n/s) must be free at any time.

  Side bars: default 0. Set n_side_per_face > 0 when D > 750mm (AS 3600 Cl. 8.6).
  Activate min/max_clear_spacing_side constraints when side bars are enabled.
  Cover defaults 30mm — update cover_bot_mm and cover_top_mm with exposure_class.
